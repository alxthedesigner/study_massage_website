<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study — MT Exam Prep</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<script>if(!localStorage.getItem('mt_session'))window.location.replace('login.html');</script>
<body>
  <div id="updateBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;text-align:center;padding:6px var(--space-4);background:linear-gradient(90deg,#1a4d2e,#226b3f,#1a4d2e);color:#7effa0;font-size:.78rem;font-weight:600;letter-spacing:.04em;border-bottom:1px solid rgba(126,255,160,0.25);box-shadow:0 2px 12px rgba(34,107,63,0.4)"></div>
  <script>
    fetch('version.json?nocache=' + Date.now())
      .then(r => r.json())
      .then(d => {
        const b = document.getElementById('updateBanner');
        b.textContent = '✦ Last Updated: ' + d.lastUpdated;
        b.style.display = 'block';
        document.body.style.paddingTop = b.offsetHeight + 'px';
      }).catch(() => {});
  </script>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">Conditions &amp; ROM</a>
    <div class="nav-links">
      <a href="study.html" class="nav-link active">Study</a>
      <a href="treatment.html" class="nav-link">SOAP Notes</a>
      <button class="btn btn-secondary nav-logout" id="navLogout">Sign Out</button>
    </div>
    <button class="nav-hamburger" id="navHamburger" aria-label="Toggle menu">&#9776;</button>
  </nav>
  <div class="nav-mobile-menu" id="navMobileMenu">
    <a href="study.html" class="nav-mobile-link">Study</a>
    <a href="treatment.html" class="nav-mobile-link">SOAP Notes</a>
    <button class="nav-mobile-link" id="navLogoutMobile" style="background:none;border:none;text-align:left;cursor:pointer;color:var(--color-text-muted);width:100%;padding:var(--space-3) 0;border-bottom:1px solid var(--color-border)">Sign Out</button>
  </div>

  <div class="study-layout">
    <aside class="sidebar">
      <div class="sidebar-mode-tabs">
        <button class="sidebar-mode-tab active" id="tabConditions">&#128214; Conditions</button>
        <button class="sidebar-mode-tab" id="tabROM">&#128208; ROM Reference</button>
      </div>
      <div id="conditionsPanel">
        <div class="sidebar-search">
          <input type="text" id="searchInput" placeholder="Search conditions..." autocomplete="off">
        </div>
        <div class="sidebar-list" id="conditionList">
          <div style="padding:16px;color:var(--color-text-muted);font-size:.88rem">Loading...</div>
        </div>
      </div>
      <div id="romPanel" style="display:none">
        <div style="padding:var(--space-3) var(--space-4) var(--space-2);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-dim)">Jump to region</div>
        <div id="romNavList" class="sidebar-list"></div>
      </div>
    </aside>

    <main class="study-content" id="studyContent">
      <div class="study-empty" id="studyEmpty">
        <div class="study-empty-icon">&#128214;</div>
        <p>Select a condition from the list to begin studying.</p>
      </div>
      <div id="conditionDetail" style="display:none"></div>
      <div id="romReference" style="display:none"></div>
    </main>
  </div>

  <script type="module">
    import { fetchConditions, fetchROMReference } from './js/modules/supabase.js?v=3';
    import { markStudied, loadProgress } from './js/modules/storage.js';
    import { getBadgeClass, getRegionLabel } from './js/main.js';
    import { logout } from './js/modules/auth.js';
    document.getElementById('navLogout').addEventListener('click', logout);
    document.getElementById('navLogoutMobile').addEventListener('click', logout);

    let CONDITIONS = [];
    let ROM_REFERENCE = [];
    let activeId = null;
    let searchQuery = '';
    let progress = loadProgress();

    async function init() {
      try {
        [CONDITIONS, ROM_REFERENCE] = await Promise.all([fetchConditions(), fetchROMReference()]);
        buildList();
        const urlParam = new URLSearchParams(window.location.search).get('condition');
        if (urlParam && CONDITIONS.find(c => c.id === urlParam)) {
          loadCondition(urlParam);
        } else if (CONDITIONS.length) {
          loadCondition(CONDITIONS[0].id);
        }
      } catch (e) {
        document.getElementById('conditionList').innerHTML =
          `<div style="padding:16px;color:var(--color-danger);font-size:.85rem">Error loading. Check connection.</div>`;
      }
    }

    function buildList() {
      const list = document.getElementById('conditionList');
      const filtered = CONDITIONS.filter(c =>
        !searchQuery || c.name.toLowerCase().includes(searchQuery) ||
        c.tags.some(t => t.toLowerCase().includes(searchQuery))
      );
      list.innerHTML = '';
      if (!filtered.length) {
        list.innerHTML = '<div style="padding:16px;font-size:.88rem;color:var(--color-text-muted)">No conditions found.</div>';
        return;
      }
      filtered.forEach(c => {
        const item = document.createElement('div');
        item.className = 'condition-list-item'
          + (c.id === activeId ? ' active' : '')
          + (progress[c.id]?.studied ? ' studied' : '');
        item.innerHTML = `<span class="condition-name">${c.name}</span><span class="condition-region">${getRegionLabel(c.region)}</span>`;
        item.addEventListener('click', () => loadCondition(c.id));
        list.appendChild(item);
      });
    }

    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase().trim();
      buildList();
    });

    function loadCondition(id) {
      activeId = id;
      progress = loadProgress();
      buildList();
      const c = CONDITIONS.find(x => x.id === id);
      if (!c) return;
      markStudied(id);

      document.getElementById('studyEmpty').style.display = 'none';
      document.getElementById('romReference').style.display = 'none';
      const detail = document.getElementById('conditionDetail');
      detail.style.display = 'block';
      detail.innerHTML = renderCondition(c);

      detail.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          detail.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          detail.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          detail.querySelector('#panel-' + btn.dataset.tab).classList.add('active');
        });
      });
    }

    function list(items, icon = '&#9679;') {
      return `<div class="icon-list">${items.map(i =>
        `<div class="icon-list-item"><span class="icon">${icon}</span><span>${i}</span></div>`
      ).join('')}</div>`;
    }

    function renderCondition(c) {
      const hasSectionData = field => c[field] && (Array.isArray(c[field]) ? c[field].length : Object.keys(c[field]).length);

      return `
      <div class="condition-header">
        <div class="condition-title-wrap">
          <h2 class="condition-title">${c.name}</h2>
          <div class="condition-tags">
            <span class="badge ${getBadgeClass(c.region)}">${getRegionLabel(c.region)}</span>
          </div>
        </div>
        <div class="condition-actions">
          <a href="treatment.html?condition=${c.id}" class="btn btn-primary btn-sm">&#127919; Treat</a>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="symptoms">Signs &amp; Symptoms</button>
        <button class="tab-btn" data-tab="objectives">Treatments (Tx)</button>
        <button class="tab-btn" data-tab="contra">Contraindications</button>
      </div>

      <!-- OVERVIEW: definition + muscle groups + causes -->
      <div class="tab-panel active" id="panel-overview">
        <div class="panel-section">
          <div class="panel-section-title">&#128218; Definition</div>
          <p class="panel-summary">${c.definition || '<em style="color:var(--color-text-dim)">Not yet available.</em>'}</p>
        </div>
        <div class="panel-section">
          <div class="panel-section-title">&#9888; Possible Causes</div>
          ${list(c.causes || [], '&#9679;')}
        </div>
        <div class="panel-section">
          <div class="panel-section-title">&#129504; Affected Muscle Groups</div>
          <div class="muscle-grid">${(c.muscleGroups || []).map(m => `
            <div class="muscle-card">
              <div class="muscle-card-name">${m.name}</div>
              <div class="muscle-card-role">${m.role}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>

      <!-- SIGNS & SYMPTOMS -->
      <div class="tab-panel" id="panel-symptoms">
        <div class="panel-section">
          <div class="panel-section-title">&#129354; Common Signs &amp; Symptoms</div>
          ${c.symptoms?.length
            ? list(c.symptoms, '&#9679;')
            : '<em style="color:var(--color-text-dim)">Not yet available.</em>'}
        </div>
      </div>

      <!-- TREATMENTS (TX) -->
      <div class="tab-panel" id="panel-objectives">
        <div class="panel-section">
          <div class="panel-section-title">&#127919; Treatment Goals</div>
          ${c.treatment_objectives?.length
            ? list(c.treatment_objectives, '&#10003;')
            : '<em style="color:var(--color-text-dim)">Not yet available.</em>'}
        </div>
        ${c.specialTests?.length ? `
        <div class="panel-section">
          <div class="panel-section-title">&#128270; Special Tests</div>
          <div class="scroll-x">
            <table class="rom-ref-table">
              <thead>
                <tr><th>Test Name</th><th>Procedure</th><th>Positive Indicates</th></tr>
              </thead>
              <tbody>
                ${c.specialTests.map(t => `<tr>
                  <td><strong>${t.name}</strong></td>
                  <td style="font-size:.82rem;color:var(--color-text-muted)">${t.procedure}</td>
                  <td style="font-size:.82rem;color:var(--color-danger)">${t.indicates}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>` : ''}
        <div class="panel-section">
          <div class="panel-section-title">&#9874; Treatment Techniques</div>
          <em style="color:var(--color-text-muted)">Refer to CMT packet for the full treatment - I aint writing all that!</em>
        </div>
        <div class="panel-section">
          <div class="panel-section-title">&#127968; Post-Treatment</div>
          <em style="color:var(--color-text-muted)">Refer to CMT packet for the full treatment - I aint writing all that!</em>
        </div>
      </div>

      <!-- CONTRAINDICATIONS -->
      <div class="tab-panel" id="panel-contra">
        <div class="panel-section">
          <div class="panel-section-title">&#128721; Contraindications</div>
          ${(c.contraindications?.absolute || []).length ? `
          <div class="contra-block contra-absolute">
            <div class="contra-block-title">&#128721; Absolute Contraindication</div>
            ${list(c.contraindications.absolute, '&#9888;')}
          </div>` : ''}
          ${(c.contraindications?.relative || []).length ? `
          <div class="contra-block contra-relative">
            <div class="contra-block-title">&#9888; Contraindication</div>
            ${list(c.contraindications.relative, '&#9679;')}
          </div>` : ''}
          ${(c.contraindications?.massageSpecific || []).length ? `
          <div class="contra-block contra-massage">
            <div class="contra-block-title">&#128077; Notes/FYI</div>
            ${list(c.contraindications.massageSpecific, '&#9679;')}
          </div>` : ''}
        </div>
      </div>

      `;
    }

    // ── Sidebar mode tabs ─────────────────────────────────────────
    document.getElementById('tabConditions').addEventListener('click', () => {
      document.getElementById('tabConditions').classList.add('active');
      document.getElementById('tabROM').classList.remove('active');
      document.getElementById('conditionsPanel').style.display = 'block';
      document.getElementById('romPanel').style.display = 'none';
      document.getElementById('romReference').style.display = 'none';
      if (activeId) {
        document.getElementById('conditionDetail').style.display = 'block';
        document.getElementById('studyEmpty').style.display = 'none';
      } else {
        document.getElementById('studyEmpty').style.display = 'flex';
      }
    });

    document.getElementById('tabROM').addEventListener('click', () => {
      document.getElementById('tabROM').classList.add('active');
      document.getElementById('tabConditions').classList.remove('active');
      document.getElementById('conditionsPanel').style.display = 'none';
      document.getElementById('romPanel').style.display = 'block';
      document.getElementById('studyEmpty').style.display = 'none';
      document.getElementById('conditionDetail').style.display = 'none';
      const el = document.getElementById('romReference');
      el.style.display = 'block';
      el.innerHTML = renderROMReference();
      buildROMNav();
    });

    function buildROMNav() {
      const partOrder = ['Cervical','Shoulder','Elbow','Wrist','Hip','Knee','Ankle'];
      const available = partOrder.filter(p => ROM_REFERENCE.some(r => r.body_part === p));
      const nav = document.getElementById('romNavList');
      nav.innerHTML = available.map(part => `
        <div class="condition-list-item rom-nav-item" data-part="${part}">${part}</div>
      `).join('');
      nav.querySelectorAll('.rom-nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
          nav.querySelectorAll('.rom-nav-item').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const anchor = document.getElementById('rom-section-' + btn.dataset.part.toLowerCase());
          if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    function renderROMReference() {
      const MOVEMENT_ORDER = [
        'flexion','extension','medial rotation','lateral rotation',
        'abduction','adduction','horizontal abduction','horizontal adduction',
        'lateral abduction','lateral adduction','lateral flexion'
      ];

      function movementIndex(name) {
        const lower = (name || '').toLowerCase();
        const idx = MOVEMENT_ORDER.findIndex(m => lower.includes(m));
        return idx === -1 ? 999 : idx;
      }

      const byPart = {};
      ROM_REFERENCE.forEach(r => {
        if (!byPart[r.body_part]) byPart[r.body_part] = [];
        byPart[r.body_part].push(r);
      });
      Object.keys(byPart).forEach(part => {
        byPart[part].sort((a, b) => movementIndex(a.movement) - movementIndex(b.movement));
      });

      const partOrder = ['Cervical','Shoulder','Elbow','Wrist','Hip','Knee','Ankle'];
      const sections = partOrder.filter(p => byPart[p]).map(part => `
        <div class="panel-section" id="rom-section-${part.toLowerCase()}">
          <div class="panel-section-title">${part}</div>
          <div class="scroll-x">
            <table class="rom-ref-table">
              <thead>
                <tr>
                  <th>Movement</th>
                  <th>Normal Range (AROM)</th>
                  <th>End-Feel (PROM)</th>
                  <th>Muscles Tested (MRT)</th>
                </tr>
              </thead>
              <tbody>
                ${byPart[part].map(r => `<tr>
                  <td>${r.movement}</td>
                  <td class="ref-val">${r.normal_min != null ? (r.normal_min > 0 ? r.normal_min + '\u2013' + r.normal_max + '\xB0' : r.normal_max + '\xB0') : '\u2014'}</td>
                  <td style="font-size:.82rem;color:var(--color-text)">${r.end_feel || '\u2014'}</td>
                  <td style="color:var(--color-text-muted);font-size:.82rem">${r.muscles_tested || ''}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`).join('');

      return `
        <div class="condition-header">
          <div class="condition-title-wrap">
            <h2 class="condition-title">ROM Reference</h2>
            <div class="condition-tags"><span class="tag">Normal Values</span></div>
          </div>
        </div>
        ${sections}`;
    }

    document.getElementById('navHamburger').addEventListener('click', () => {
      document.getElementById('navMobileMenu').classList.toggle('open');
    });

    init();
  </script>
</body>
</html>
