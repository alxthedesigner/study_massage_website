name: Update timestamp on push

on:
  push:
    branches: [main]
    paths-ignore:
      - 'version.json'

jobs:
  timestamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write version.json
        run: |
          echo "{\"lastUpdated\": \"$(date -u +'%B %d, %Y at %I:%M %p UTC')\"}" > version.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: update timestamp [skip ci]"
          git push
